<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aedis — Receipt Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --abyss-0:#00030a;--abyss-1:#02061a;--abyss-2:#040d26;--abyss-3:#07173a;
  --abyss-line:rgba(120,210,255,.14);--abyss-edge:rgba(160,220,255,.22);
  --orange:#fb923c;--orange-hot:#ffb366;--orange-dim:rgba(251,146,60,.58);
  --teal:#4df5c8;--teal-hot:#7bffdd;--teal-dim:rgba(77,245,200,.58);
  --cyan:#6fd9ff;--cyan-hot:#a0e9ff;--violet:#b196ff;
  --red:#ff5577;--amber:#ffcf6b;--good:#4df5c8;--gray:rgba(255,255,255,.55);
  --ink:var(--orange);--ink-soft:rgba(251,146,60,.72);
  --body:'Space Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --shadow-panel:0 24px 80px rgba(0,0,0,.72),0 0 0 1px rgba(20,40,80,.6);
}
html,body{
  min-height:100%;
  background:radial-gradient(ellipse 70% 55% at 50% 42%,transparent 24%,rgba(0,0,4,.82) 100%),radial-gradient(circle at 8% 12%,rgba(111,217,255,.16),transparent 34%),radial-gradient(circle at 92% 8%,rgba(77,245,200,.14),transparent 36%),linear-gradient(180deg,#020617 0%,#01030d 46%,#020818 100%);
  color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;
}
a{color:var(--cyan);text-decoration:none}a:hover{color:var(--teal)}
.nav{background:rgba(4,10,24,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--abyss-line);padding:12px 24px;display:flex;gap:24px;align-items:center;position:sticky;top:0;z-index:100}
.nav a{color:var(--ink-soft);font-size:14px;transition:color 200ms}
.nav a:hover,.nav a.active{color:var(--orange)}
.nav .brand{font-weight:700;font-size:18px;color:var(--orange);margin-right:auto}
.panel{background:rgba(4,10,24,.72);border:1px solid rgba(20,40,80,.6);border-radius:16px;padding:20px 24px;box-shadow:var(--shadow-panel);margin:20px auto;max-width:1100px}
.page-title{font-size:22px;font-weight:700;color:var(--orange);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink-soft);margin-bottom:20px}
.form-row{display:flex;gap:10px;max-width:700px;margin-bottom:24px}
.form-row input{flex:1;background:rgba(4,10,24,.8);border:1px solid rgba(120,200,255,.18);border-radius:10px;padding:10px 14px;color:var(--ink);font-family:var(--mono);font-size:14px;outline:none}
.form-row input:focus{border-color:var(--teal-dim)}
.form-row button{background:rgba(77,245,200,.1);border:1px solid rgba(77,245,200,.38);color:var(--teal);padding:10px 18px;border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--body);transition:background 200ms}
.form-row button:hover{background:rgba(77,245,200,.2)}
.placeholder{text-align:center;padding:40px;color:var(--ink-dim);font-family:var(--mono)}
.error-msg{color:var(--red);padding:20px;font-family:var(--mono);background:rgba(255,85,119,.08);border-radius:12px;border:1px solid rgba(255,85,119,.2)}
.receipt-header{display:flex;gap:16px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--abyss-line);margin-bottom:20px}
.rh-task{font-family:var(--mono);font-size:13px;color:var(--cyan)}
.rh-badge{
  font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:999px;
  letter-spacing:.06em;text-transform:uppercase;
}
.rh-badge.success{background:rgba(77,245,200,.14);color:var(--teal);border:1px solid rgba(77,245,200,.38)}
.rh-badge.failed{background:rgba(255,85,119,.14);color:var(--red);border:1px solid rgba(255,85,119,.38)}
.rh-badge.partial{background:rgba(251,191,36,.14);color:var(--amber);border:1px solid rgba(251,191,36,.38)}
.rh-badge.running{background:rgba(111,217,255,.1);color:var(--cyan);border:1px solid rgba(111,217,255,.3)}
.rh-prompt{font-size:14px;color:var(--ink);margin-top:8px;line-height:1.5}
.rh-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
.rh-meta span{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.rh-meta span strong{color:var(--ink-soft)}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.metric{border-radius:12px;background:rgba(111,217,255,.04);border:1px solid rgba(120,200,255,.08);padding:14px}
.metric .label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}
.metric .value{font-family:var(--mono);font-size:22px;color:var(--teal);margin-top:6px}
.section{margin-bottom:18px}
.section-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--abyss-line)}
.file-list{list-style:none;display:grid;gap:6px}
.file-item{
  display:flex;gap:10px;align-items:center;
  font-family:var(--mono);font-size:13px;
  padding:8px 12px;border-radius:8px;
  background:rgba(4,10,24,.5);
  border:1px solid rgba(120,200,255,.06);
}
.file-op{font-size:10px;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.file-op.create{background:rgba(77,245,200,.14);color:var(--teal)}
.file-op.modify{background:rgba(251,146,60,.14);color:var(--orange)}
.file-op.delete{background:rgba(255,85,119,.14);color:var(--red)}
.file-path{color:var(--ink-soft);word-break:break-all}
.step-list{display:grid;gap:8px}
.step-card{
  border-radius:10px;padding:12px 14px;
  background:rgba(4,10,24,.5);
  border:1px solid rgba(120,200,255,.06);
  font-size:13px;
}
.step-worker{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--cyan)}
.step-desc{color:var(--ink);margin-top:4px}
.step-time{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-top:2px}
.verdict-card{
  border-radius:12px;padding:16px 18px;
  border:1px solid;
  margin-bottom:12px;
}
.verdict-card.pass{border-color:rgba(77,245,200,.3);background:rgba(77,245,200,.06)}
.verdict-card.fail{border-color:rgba(255,85,119,.3);background:rgba(255,85,119,.06)}
.verdict-card .v-head{font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
.verdict-card .v-head.pass{color:var(--teal)}
.verdict-card .v-head.fail{color:var(--red)}
.verdict-card .v-body{font-size:14px;color:var(--ink);margin-top:6px;line-height:1.5}
.verdict-card .v-fix{margin-top:8px;font-size:12px;color:var(--amber);font-style:italic}
.confidence-row{display:flex;gap:10px;flex-wrap:wrap}
.conf-chip{
  border-radius:8px;padding:8px 14px;
  background:rgba(111,217,255,.05);
  border:1px solid rgba(120,200,255,.1);
  font-family:var(--mono);font-size:12px;
}
.conf-chip .c-label{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em}
.conf-chip .c-val{color:var(--teal);font-size:16px;margin-top:2px}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="brand">Aedis</a>
  <a href="/">Loqui</a>
  <a href="/ui/cost.html">Cost</a>
  <a href="/ui/sessions.html">Sessions</a>
  <a href="/ui/receipt.html" class="active">Receipts</a>
  <a href="/ui/trust.html">Trust</a>
</nav>

<main class="panel" style="margin-top:12px">
  <h1 class="page-title">Receipt Viewer</h1>
  <p class="page-sub">Inspect build receipts: task info, steps, files changed, and verification result.</p>

  <form class="form-row" onsubmit="return handleLookup(event)">
    <input id="receipt-id-input" type="text" placeholder="Enter task ID or run ID" />
    <button type="submit">Load Receipt</button>
  </form>

  <div id="receipt-content"></div>
</main>

<script>
const API = "http://localhost:18796";

function badgeHtml(verdict) {
  if (verdict === "success" || verdict === "VERIFIED_SUCCESS") return '<span class="rh-badge success">Verified Pass</span>';
  if (verdict === "failed" || verdict === "VERIFIED_FAIL" || verdict === "CRUCIBULUM_FAIL") return '<span class="rh-badge failed">Failed</span>';
  if (verdict === "partial" || verdict === "PARTIAL_SUCCESS") return '<span class="rh-badge partial">Partial</span>';
  if (verdict === "running") return '<span class="rh-badge running">Running</span>';
  return `<span class="rh-badge">${verdict ?? "—"}</span>`;
}

function classificationBadge(cls) {
  if (!cls) return "";
  const clsLower = String(cls).toLowerCase();
  if (clsLower.includes("success") && !clsLower.includes("partial")) return '<span class="rh-badge success">' + cls + '</span>';
  if (clsLower.includes("fail") || clsLower.includes("error")) return '<span class="rh-badge failed">' + cls + '</span>';
  if (clsLower.includes("partial")) return '<span class="rh-badge partial">' + cls + '</span>';
  return `<span class="rh-badge">${cls}</span>`;
}

function opClass(op) {
  const o = String(op ?? "").toLowerCase();
  if (o.includes("create")) return "create";
  if (o.includes("delete")) return "delete";
  return "modify";
}

function renderReceipt(data) {
  const r = data.receipt ?? data;
  const taskId = data.task_id ?? data.taskId ?? r?.runId ?? "—";
  const runId = r?.runId ?? "—";
  const verdict = r?.verdict ?? r?.finalClassification ?? "—";
  const prompt = r?.prompt ?? "—";
  const startedAt = r?.startedAt ?? r?.submittedAt ?? "—";
  const completedAt = r?.completedAt ?? "—";
  const cost = r?.totalCost?.estimatedCostUsd ?? r?.costUsd ?? 0;
  const confidence = r?.confidence ?? r?.humanSummary?.confidence ?? {};
  const files = r?.changesSummary ?? r?.filesTouched ?? [];
  const errors = r?.humanSummary?.failureExplanation;

  let html = `
    <div class="receipt-header">
      <div>
        <span class="rh-task">task: ${taskId.slice(0, 12)} &nbsp; run: ${runId.slice(0, 12)}</span>
        ${badgeHtml(verdict)}
        ${classificationBadge(r?.finalClassification)}
      </div>
      <div class="rh-prompt">${prompt}</div>
      <div class="rh-meta">
        <span>submitted: <strong>${startedAt ? new Date(startedAt).toLocaleString() : "—"}</strong></span>
        <span>completed: <strong>${completedAt ? new Date(completedAt).toLocaleString() : "—"}</strong></span>
        <span>cost: <strong style="color:var(--teal)">$${Number(cost).toFixed(4)}</strong></span>
        ${r?.durationMs ? `<span>duration: <strong>${Math.round(Number(r.durationMs)/1000)}s</strong></span>` : ""}
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric"><div class="label">Confidence (overall)</div><div class="value">${(((confidence?.overall ?? 0) * 100) || 0).toFixed(0)}%</div></div>
      <div class="metric"><div class="label">Confidence (planning)</div><div class="value">${(((confidence?.planning ?? 0) * 100) || 0).toFixed(0)}%</div></div>
      <div class="metric"><div class="label">Confidence (execution)</div><div class="value">${(((confidence?.execution ?? 0) * 100) || 0).toFixed(0)}%</div></div>
      <div class="metric"><div class="label">Confidence (verification)</div><div class="value">${(((confidence?.verification ?? 0) * 100) || 0).toFixed(0)}%</div></div>
    </div>
  `;

  // Verification
  if (r?.executionVerified !== null && r?.executionVerified !== undefined) {
    const pass = r.executionVerified;
    html += `
      <div class="verdict-card ${pass ? 'pass' : 'fail'}">
        <div class="v-head ${pass ? 'pass' : 'fail'}">${pass ? "Execution Verified" : "Execution Failed"}</div>
        <div class="v-body">${r.executionGateReason ?? (pass ? "All checks passed." : "One or more checks failed.")}</div>
      </div>
    `;
  }

  // Failure explanation
  if (errors) {
    html += `
      <div class="verdict-card fail" style="margin-top:12px">
        <div class="v-head fail">Failure: ${errors.stage ?? "unknown"} stage</div>
        <div class="v-body">${errors.rootCause ?? "Unknown root cause."}</div>
        ${errors.suggestedFix ? `<div class="v-fix">Suggested fix: ${errors.suggestedFix}</div>` : ""}
      </div>
    `;
  }

  // Build steps
  const workerEvents = r?.workerEvents ?? [];
  if (workerEvents.length > 0) {
    html += `<div class="section"><div class="section-title">Build Steps</div><div class="step-list">`;
    for (const ev of workerEvents) {
      html += `
        <div class="step-card">
          <div class="step-worker">${ev.workerType ?? "worker"} — ${ev.status ?? "?"}</div>
          <div class="step-desc">${ev.summary ?? "—"}</div>
          <div class="step-time">${ev.at ? new Date(ev.at).toLocaleString() : ""} · $${Number(ev.costUsd ?? 0).toFixed(4)}</div>
        </div>
      `;
    }
    html += `</div></div>`;
  }

  // Files changed
  if (files.length > 0) {
    html += `<div class="section"><div class="section-title">Files Changed (${files.length})</div><ul class="file-list">`;
    for (const f of files) {
      html += `<li class="file-item"><span class="file-op ${opClass(f.operation)}">${f.operation ?? "?"}</span><span class="file-path">${f.path ?? "—"}</span></li>`;
    }
    html += `</ul></div>`;
  }

  return html;
}

async function handleLookup(event) {
  event.preventDefault();
  const id = document.getElementById("receipt-id-input").value.trim();
  if (!id) return false;
  const content = document.getElementById("receipt-content");
  content.innerHTML = '<div class="placeholder">Loading...</div>';

  try {
    // Try task receipts endpoint first, then run receipts
    let res = await fetch(`${API}/tasks/${encodeURIComponent(id)}/receipts`);
    if (!res.ok) res = await fetch(`${API}/runs/${encodeURIComponent(id)}/receipts`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();
    content.innerHTML = renderReceipt(data);
  } catch(err) {
    content.innerHTML = `<div class="error-msg">Receipt not found for "${id}": ${err.message}</div>`;
  }
  return false;
}

// If an ID was passed as URL hash, load it immediately
(function() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    document.getElementById("receipt-id-input").value = hash;
    handleLookup({preventDefault(){}});
  }
})();
</script>
</body>
</html>

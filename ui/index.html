      if (payload.prompt || payload.request || payload.input) run.prompt = payload.prompt || payload.request || payload.input;
      if (payload.repoPath || payload.repo_path) run.repoPath = payload.repoPath || payload.repo_path;
      if (payload.startedAt || payload.started_at) run.startedAt = payload.startedAt || payload.started_at;
      if (payload.completedAt || payload.completed_at) run.completedAt = payload.completedAt || payload.completed_at;
      if (payload.totalCostUsd != null || payload.total_cost_usd != null) run.totalCostUsd = Number(payload.totalCostUsd ?? payload.total_cost_usd ?? run.totalCostUsd);
      if (payload.verdict) run.verdict = String(payload.verdict);
      if (payload.commitSha || payload.commit_sha) run.commitSha = String(payload.commitSha || payload.commit_sha);
      if (type === 'commit_created' && payload.sha) run.commitSha = String(payload.sha);

      // Close the Loqui build loop. If this run was submitted via
      // build-mode and we're now seeing its completion event, fire
      // the follow-up question that asks Loqui to summarize what
      // happened and suggest the next step. Field updates above have
      // already run, so run.verdict / run.commitSha / run.totalCostUsd
      // reflect the latest event stream state even when the
      // run_complete payload itself is sparse.
      if (type === 'run_complete' || type === 'done') {
        maybeHandleLoquiBuildCompletion(run, payload);
      }

      if (Array.isArray(payload.receipts)) {
        run.receipts = payload.receipts.map((receipt) => normalizeReceipt(receipt));
        run.receiptCount = run.receipts.length;
        run.totalCostUsd = run.receipts.reduce((sum, receipt) => sum + (Number(receipt.costUsd) || 0), 0);
      }

      if (payload.graph || payload.taskGraph || payload.task_graph) {
        run.graph = normalizeGraph(payload.graph || payload.taskGraph || payload.task_graph);
      }

      if (Array.isArray(payload.workers)) applyWorkers(run, payload.workers);
      if (payload.worker || payload.workerStatus || payload.worker_status) applyWorkers(run, [payload.worker || payload.workerStatus || payload.worker_status]);

      if (type === 'receipt_generated' && payload.receipt) {
        const r = payload.receipt;
        const tc = r.totalCost || {};
        const summary = r.summary || {};
        const cost = Number(tc.estimatedCostUsd ?? tc.estimated_cost_usd ?? 0);
        const filesModifiedRaw = summary.filesModified ?? summary.files_modified;
        const filesModified = Array.isArray(filesModifiedRaw)
          ? filesModifiedRaw.length
          : Number(filesModifiedRaw || 0);
        const commitSha = r.commitSha || r.commit_sha || '';
        const receipt = {
          id: String(
            r.id ||
            r.receiptId ||
            payload.receiptId ||
            `receipt-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`
          ),
          worker: String(r.verdict || 'run'),
          model: String(commitSha ? String(commitSha).slice(0, 10) : (r.verdict || 'complete')),
          inputTokens: Number(tc.inputTokens ?? tc.input_tokens ?? 0),
          outputTokens: Number(tc.outputTokens ?? tc.output_tokens ?? 0),
          totalTokens: Number(tc.totalTokens ?? tc.total_tokens ?? 0),
          durationMs: Number(r.durationMs ?? r.duration_ms ?? 0),
          at: r.at || new Date().toISOString(),
          costUsd: cost,
          filesModified,
          commitSha,
        };
        run.receipts.unshift(receipt);
        run.receipts = run.receipts.slice(0, 40);
        run.receiptCount = run.receipts.length;
        run.totalCostUsd = cost;
        if (commitSha) run.commitSha = commitSha;
        if (r.verdict) run.verdict = String(r.verdict);
      } else if (type.includes('receipt')) {
        const receipt = normalizeReceipt(payload.receipt || payload);
        appendReceipt(run, receipt);
      }

      if (type === 'worker_complete' && payload.payload && payload.payload.cost) {
        const receipt = normalizeReceipt(payload.payload);
        appendReceipt(run, receipt);
      }

      if (type === 'run_started' || type === 'start' || type === 'run') run.status = 'running';
      else if (type.includes('complete') || type === 'done') {
        run.status = payload.verdict || payload.status || 'complete';
        if (payload.verdict) run.verdict = String(payload.verdict);
        run.completedAt = payload.completedAt || payload.completed_at || new Date().toISOString();
      } else if (type.includes('partial')) run.status = 'partial';
      else if (type.includes('error') || type.includes('failed')) run.status = 'failed';
      else if (payload.status) run.status = payload.status;

      if (payload.task && !payload.graph) mergeTaskIntoGraph(run, payload.task, type);
      if (payload.node) mergeTaskIntoGraph(run, payload.node, type);

      if (type === 'worker_assigned') {
        const workerType = String(
          payload.workerType ||
          payload.worker_type ||
          (payload.task && (payload.task.workerType || payload.task.worker_type)) ||
          ''
        ).toLowerCase();
        setActiveWorker(run, workerType);
      }

      if (type === 'task_complete' || type === 'task_failed' || type === 'run_complete') {
        clearActiveWorkers(run);
      }

      render();
    }

    function clearActiveWorkers(run) {
      for (const role of ROLE_ORDER) {
        run.workers[role].active = false;
      }
    }

    function setActiveWorker(run, workerType) {
      clearActiveWorkers(run);
      if (!ROLE_ORDER.includes(workerType)) return;
      run.workers[workerType].active = true;
    }

    function appendReceipt(run, receipt) {
      if (!receipt) return;
      run.receipts.unshift(receipt);
      run.receipts = run.receipts.slice(0, 40);
      run.receiptCount = run.receipts.length;
      run.totalCostUsd = Number(run.totalCostUsd || 0) + Number(receipt.costUsd || 0);
    }

    function normalizeGraph(graph) {
      const nodes = Array.isArray(graph.nodes) ? graph.nodes.map((node) => ({
        id: String(node.id || node.taskId || node.task_id || node.label),
        label: String(node.label || node.description || node.title || node.id),
        status: normalizeNodeStatus(node.status || 'planned'),
        workerType: String(node.workerType || node.worker_type || inferWorkerType(node.label || node.id || 'builder')),
      })) : [];
      const edges = Array.isArray(graph.edges) ? graph.edges.map((edge) => ({
        from: String(edge.from || edge.source),
        to: String(edge.to || edge.target)
      })) : [];
      return { nodes, edges };
    }

    function normalizeNodeStatus(status) {
      const text = String(status || '').toLowerCase();
      if (/(complete|done|success)/.test(text)) return 'completed';
      if (/(fail|error)/.test(text)) return 'failed';
      if (/(active|running|busy|dispatch|working)/.test(text)) return 'active';
      if (/(ready|queued|waiting)/.test(text)) return 'ready';
      return 'planned';
    }

    function inferWorkerType(value) {
      const text = String(value || '').toLowerCase();
      if (text.includes('scout')) return 'scout';
      if (text.includes('critic')) return 'critic';
      if (text.includes('verify')) return 'verifier';
      if (text.includes('integrat') || text.includes('merge')) return 'integrator';
      return 'builder';
    }

    function mergeTaskIntoGraph(run, task, type) {
      const id = String(task.id || task.taskId || task.task_id || task.label || `task-${run.graph.nodes.length + 1}`);
      const existing = run.graph.nodes.find((node) => node.id === id);
      const next = {
        id,
        label: String(task.label || task.description || task.title || id),
        status: normalizeNodeStatus(task.status || eventStatusFromType(type)),
        workerType: String(task.workerType || task.worker_type || inferWorkerType(task.label || task.description || id)),
      };
      if (existing) Object.assign(existing, next);
      else run.graph.nodes.push(next);

      const upstream = task.dependsOn || task.depends_on || task.from;
      if (Array.isArray(upstream)) {
        for (const source of upstream) addGraphEdge(run.graph, String(source), id);
      }
    }

    function addGraphEdge(graph, from, to) {
      if (!graph.edges.find((edge) => edge.from === from && edge.to === to)) {
        graph.edges.push({ from, to });
      }
    }

    function eventStatusFromType(type) {
      if (type.includes('complete') || type.includes('done')) return 'completed';
      if (type.includes('active') || type.includes('start') || type.includes('dispatch')) return 'active';
      if (type.includes('fail') || type.includes('error')) return 'failed';
      return 'planned';
    }

    function normalizeReceipt(input) {
      if (!input) return null;
      const cost = input.cost || {};
      const source = input.cost ? cost : input;
      const worker = String(
        input.workerType ||
        input.worker_type ||
        input.worker ||
        source.workerType ||
        source.worker_type ||
        source.worker ||
        'system'
      ).toLowerCase();
      const inputTokens = Number(source.inputTokens ?? source.input_tokens ?? source.promptTokens ?? source.prompt_tokens ?? 0);
      const outputTokens = Number(source.outputTokens ?? source.output_tokens ?? source.completionTokens ?? source.completion_tokens ?? 0);
      const totalTokens = Number(source.totalTokens ?? source.total_tokens ?? (inputTokens + outputTokens));
      const durationMs = Number(source.durationMs ?? source.duration_ms ?? source.latencyMs ?? source.latency_ms ?? 0);
      const costUsd = Number(source.estimatedCostUsd ?? source.estimated_cost_usd ?? source.costUsd ?? source.cost_usd ?? source.cost ?? 0);

      return {
        id: String(
          input.id ||
          input.receiptId ||
          input.receipt_id ||
          input.taskId ||
          input.task_id ||
          `receipt-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`
        ),
        worker,
        model: String(source.model || source.modelName || source.model_name || 'unknown'),
        inputTokens,
        outputTokens,
        totalTokens,
        durationMs,
        at: input.at || input.timestamp || new Date().toISOString(),
        costUsd,
        filesModified: 0,
        commitSha: '',
      };
    }

    function applyWorkers(run, workers) {
      for (const item of workers) {
        const role = String(item.role || item.workerType || item.worker_type || inferWorkerType(item.name || '')).toLowerCase();
        if (!ROLE_ORDER.includes(role)) continue;
        const previous = run.workers[role] || {};
        run.workers[role] = {
          role,
          status: String(item.status || 'idle'),
          model: String(item.model || item.assignedModel || item.assigned_model || 'unassigned'),
          currentTask: String(item.currentTask || item.task || item.current_task || 'waiting'),
          note: String(item.note || item.detail || ''),
          active: item.active != null ? Boolean(item.active) : Boolean(previous.active),
        };
      }
    }

    async function loadModelConfig() {
      const cached = window.localStorage.getItem(STORAGE_KEYS.modelConfig);
      if (cached) {
        try {
          state.modelConfig = mergeModelConfig(JSON.parse(cached));
        } catch {
          state.modelConfig = { ...DEFAULT_MODEL_CONFIG };
        }
      }
      renderSettings();
      try {
        const res = await fetch(`${API_BASE}/config/models`);
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        state.modelConfig = mergeModelConfig(data.models || data);
        window.localStorage.setItem(STORAGE_KEYS.modelConfig, JSON.stringify(state.modelConfig));
        setConfigStatus('Model config loaded.', false);
      } catch (err) {
        setConfigStatus(`Using local defaults. ${err.message}`, true);
      }
      renderSettings();
      renderWorkers();
    }

    async function saveModelConfig() {
      const payload = {};
      for (const role of CONFIG_ROLE_ORDER) payload[role] = readSetting(role);
      try {
        const res = await fetch(`${API_BASE}/config/models`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ models: payload }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.message || body.error || `${res.status}`);
        }
        const data = await res.json().catch(() => ({ models: payload }));
        state.modelConfig = mergeModelConfig(data.models || payload);
        window.localStorage.setItem(STORAGE_KEYS.modelConfig, JSON.stringify(state.modelConfig));
        setConfigStatus('Saved. Applies on next run.', false);
      } catch (err) {
        state.modelConfig = mergeModelConfig(payload);
        window.localStorage.setItem(STORAGE_KEYS.modelConfig, JSON.stringify(state.modelConfig));
        setConfigStatus(`Save failed. Kept local selection. ${err.message}`, true);
      }
      renderSettings();
      renderWorkers();
    }

    function mergeModelConfig(input) {
      const merged = { ...DEFAULT_MODEL_CONFIG };
      for (const role of CONFIG_ROLE_ORDER) {
        if (input && input[role] && input[role].model) {
          merged[role] = {
            model: String(input[role].model),
            provider: String(input[role].provider || findProvider(role, input[role].model) || 'unknown'),
          };
        }
      }
      return merged;
    }

    function findProvider(role, model) {
      // Returns the FIRST option whose model name matches. Now that
      // qwen3.6-plus appears twice (modelstudio + portum), this is only
      // safe as a fallback when the caller has no provider hint at all —
      // readSetting() uses the option index instead, and mergeModelConfig
      // prefers an explicit input.provider before falling back here.
      const option = (MODEL_OPTIONS[role] || []).find((entry) => entry.model === model);
      return option ? option.provider : null;
    }

    function readSetting(role) {
      if (role === 'scout' || role === 'verifier') return MODEL_OPTIONS[role][0];
      const select = document.getElementById(`model-${role}`);
      const opts = MODEL_OPTIONS[role] || [];
      // The <option> values are now indices into MODEL_OPTIONS[role] so
      // duplicate model names (qwen3.6-plus on modelstudio AND portum) can
      // be distinguished. Falls back to the current state if the select
      // element isn't mounted yet.
      if (select) {
        const idx = Number(select.value);
        if (Number.isInteger(idx) && idx >= 0 && idx < opts.length) {
          return { model: opts[idx].model, provider: opts[idx].provider };
        }
      }
      const current = state.modelConfig[role];
      return {
        model: current.model,
        provider: current.provider,
      };
    }

    function setConfigStatus(message, isError) {
      const node = document.getElementById('config-status');
      node.textContent = message;
      node.style.color = isError ? 'var(--orange)' : 'var(--teal)';
    }

    function getAssignedModel(role) {
      const cfg = state.modelConfig[role];
      return cfg ? `${cfg.model} [${cfg.provider}]` : 'unassigned';
    }

    function isRunActive() {
      const status = normalizeRunStatus(state.active.status);
      return state.submitting || status === 'queued' || status === 'running';
    }

    function render() {
      renderHeader();
      renderWorkers();
      renderTrustSummary();
      renderReceipts();
      renderLumen();
      renderHistory();
      renderGraph();
      renderLoqui();

      const active = isRunActive();
      const button = document.getElementById('submit-button');
      button.disabled = active;
      button.classList.toggle('running', active);
      button.textContent = state.submitting
        ? 'Sending…'
        : active ? 'RUNNING...' : 'Run';

      const progress = document.getElementById('run-progress');
      if (progress) progress.classList.toggle('active', active);

      persistRuns();
    }

    function renderHeader() {
      const run = state.active;
      const status = normalizeRunStatus(run.status);
      const runWord = document.getElementById('run-word');
      runWord.className = `run-word ${status}`;
      runWord.textContent = status.toUpperCase();
      document.getElementById('cost-display').textContent = `$${Number(run.totalCostUsd || 0).toFixed(4)}`;
      document.getElementById('receipt-count').textContent = String(run.receiptCount || run.receipts.length || 0);
      document.getElementById('repo-display').textContent = run.repoPath || state.repoPath || '.';
      document.getElementById('run-id').textContent = run.id || 'none';
      document.getElementById('run-started').textContent = run.startedAt ? new Date(run.startedAt).toLocaleTimeString() : 'not started';
      document.getElementById('run-completed').textContent = run.completedAt ? new Date(run.completedAt).toLocaleTimeString() : 'in progress';
    }

    function normalizeRunStatus(status) {
      const text = String(status || 'idle').toLowerCase();
      if (text.includes('fail') || text.includes('error')) return 'failed';
      if (text.includes('partial')) return 'partial';
      if (text.includes('complete') || text === 'done' || text === 'success') return 'complete';
      if (text.includes('running') || text.includes('active') || text === 'start') return 'running';
      if (text.includes('queue')) return 'queued';
      return 'idle';
    }

    function renderWorkers() {
      const html = ROLE_ORDER.map((role) => {
        const worker = state.active.workers[role];
        const normalized = String(worker.status || 'idle').toLowerCase();
        const isFailed = /(fail|error)/.test(normalized);
        const isActive = Boolean(worker.active);
        const isIdle = !isActive && !isFailed;
        const accent = ROLE_COLORS[role];
        const badgeStatus = String(worker.status || 'waiting').trim().toLowerCase();
        return `
          <article class="worker-card ${isActive ? 'active' : ''} ${isIdle ? 'idle' : ''} ${isFailed ? 'failed' : ''}" data-worker-type="${esc(role)}" style="--accent:${accent}">
            <div class="worker-top">
              <div class="worker-role">${esc(role)}</div>
              <span class="worker-badge" data-status="${esc(badgeStatus)}">${esc(worker.status)}</span>
            </div>
            <div class="worker-main">${esc(compactTask(worker.currentTask))}</div>
            <div class="tiny-row">
              <span class="label">Runtime</span>
              <span class="tiny">${esc(worker.model)}</span>
            </div>
            <div class="tiny-row">
              <span class="label">Assigned</span>
              <span class="tiny">${esc(getAssignedModel(role))}</span>
            </div>
            <div class="tiny-row">
              <span class="mini-chip">${esc(shortWorkerState(normalized))}</span>
              <span class="tiny">${esc(worker.note || 'live')}</span>
            </div>
          </article>
        `;
      }).join('');
      document.getElementById('worker-grid').innerHTML = html;
    }

    function compactTask(task) {
      const text = String(task || 'waiting').trim();
      if (text.length <= 42) return text;
      return `${text.slice(0, 39)}...`;
    }

    function shortWorkerState(status) {
      if (/(fail|error)/.test(status)) return 'alert';
      if (/(active|running|busy|assigned|working)/.test(status)) return 'live';
      return 'idle';
    }

    function renderReceipts() {
      const receipts = state.active.receipts || [];
      const container = document.getElementById('receipt-list');
      if (!receipts.length) {
        container.innerHTML = '<div class="empty">No receipts yet</div>';
        return;
      }
      container.innerHTML = receipts.map((receipt) => {
        const sha = receipt.commitSha ? String(receipt.commitSha).slice(0, 10) : '';
        const chipText = sha || receipt.model || 'unknown';
        return `
          <article class="receipt-card">
            <div class="receipt-row">
              <div class="receipt-model">${esc(String(receipt.worker || 'system').toUpperCase())}</div>
              <div class="mini-chip">${esc(chipText)}</div>
            </div>
            <div class="receipt-metrics">
              <div class="receipt-metric">
                <div class="label">Cost</div>
                <div class="receipt-number">$${Number(receipt.costUsd || 0).toFixed(4)}</div>
              </div>
              <div class="receipt-metric">
                <div class="label">Files</div>
                <div class="receipt-number">${formatInt(receipt.filesModified || 0)}</div>
              </div>
              <div class="receipt-metric">
                <div class="label">Tokens</div>
                <div class="receipt-number">${formatInt(receipt.totalTokens)}</div>
              </div>
              <div class="receipt-metric">
                <div class="label">Time</div>
                <div class="receipt-number">${formatDuration(receipt.durationMs)}</div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    /**
     * Render the Trust Summary panel. Hidden when there is no
     * summary yet (pre-run, idle state). Grounded entirely in
     * state.active.runSummary + state.active.blastRadius — every
     * field comes from the coordinator's run_summary event.
     */
    function renderTrustSummary() {
      const panel = document.getElementById('trust-summary-panel');
      if (!panel) return;
      const run = state.active;
      const summary = run && run.runSummary;
      const blast = (summary && summary.blastRadius) || (run && run.blastRadius) || null;

      if (!summary && !blast) {
        panel.style.display = 'none';
        return;
      }

      panel.style.display = '';
      const chipEl = document.getElementById('trust-summary-chip');
      const body = document.getElementById('trust-summary-body');

      // Pre-summary: we have a blast radius but no summary yet.
      // Show the projected risk chip + rationale so the user sees
      // the expected scale before execution finishes.
      if (!summary && blast) {
        if (chipEl) {
          chipEl.textContent = `projected · ${blast.level}`;
          chipEl.className = 'tiny';
        }
        body.innerHTML = `
          <div class="trust-summary-narrative">
            Projected blast radius: <strong>${esc(blast.level)}</strong>.
            ${esc(blast.rationale || '')}
          </div>
        `;
        return;
      }

      // Post-summary: full render.
      const cls = String(summary.classification || 'unknown').toLowerCase();
      if (chipEl) {
        chipEl.textContent = summary.classification || '—';
        chipEl.className = `trust-summary-chip ${esc(cls)}`;
      }

      const confidencePct = Math.round((summary.confidence?.overall || 0) * 100);
      const costLabel = (summary.cost && summary.cost.displayUsd) || '$0.00';
      const verificationLabel = summary.verification || 'not-run';
      const blastLabel = (summary.blastRadius && summary.blastRadius.level) || (blast && blast.level) || 'unknown';
      const filesLabel = Number(summary.filesTouchedCount || 0);
      const changesPreview = (summary.whatChanged || []).slice(0, 5)
        .map((c) => `${esc(c.operation)}:${esc(c.path)}`)
        .join(' · ') || '(no file changes)';

      const failureBlock = summary.failureExplanation
        ? `
          <div class="trust-summary-failure">
            <div><strong>Root cause</strong> (${esc(summary.failureExplanation.stage)}): ${esc(summary.failureExplanation.rootCause)}</div>
            <div style="margin-top:6px"><strong>Suggested fix:</strong> ${esc(summary.failureExplanation.suggestedFix)}</div>
          </div>
        `
        : '';

      body.innerHTML = `
        <div class="trust-summary-narrative">${esc(summary.narrative || summary.headline || '')}</div>
        <div class="trust-summary-grid">
          <div class="trust-summary-metric">
            <div class="label">Files touched</div>
            <div class="value">${filesLabel}</div>
          </div>
          <div class="trust-summary-metric">
            <div class="label">Verification</div>
            <div class="value">${esc(verificationLabel)}</div>
          </div>
          <div class="trust-summary-metric">
            <div class="label">Blast radius</div>
            <div class="value">${esc(blastLabel)}</div>
          </div>
          <div class="trust-summary-metric">
            <div class="label">Cost</div>
            <div class="value">${esc(costLabel)}</div>
          </div>
          <div class="trust-summary-metric">
            <div class="label">Confidence</div>
            <div class="value">${confidencePct}%</div>
            <span class="trust-summary-meter"><div style="width:${confidencePct}%"></div></span>
          </div>
        </div>
        <div class="trust-summary-narrative" style="font-size:12px;color:var(--gray)">
          Changes: ${changesPreview}
        </div>
        ${failureBlock}
      `;
    }

    function renderLumen() {
      const log = document.getElementById('lumen-log');
      if (!log) return;

      const lumen = state.active.lumen || [];
      if (lumen.length === 0) {
        log.innerHTML = '<div class="lumen-empty">Waiting for runtime events…</div>';
        return;
      }

      log.innerHTML = lumen.map((entry) => {
        const classes = ['lumen-line'];
        if (entry.color) classes.push(entry.color);
        if (entry.big) classes.push('big');
        if (entry.verdictClass) classes.push(entry.verdictClass);
        return `
          <div class="${classes.join(' ')}">
            <span class="icon">${esc(entry.icon)}</span>
            <span class="text">${esc(entry.text)}</span>
          </div>
        `;
      }).join('');

      log.scrollTop = log.scrollHeight;
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      if (!state.runs.length) {
        list.innerHTML = '<div class="empty">Runs show up here</div>';
        return;
      }
      list.innerHTML = state.runs.slice(0, 14).map((run) => {
        const status = normalizeRunStatus(run.status);
        const verdict = run.verdict || status;
        const sha = run.commitSha ? String(run.commitSha).slice(0, 10) : '';
        const promptText = run.prompt && run.prompt.trim().length > 0
          ? run.prompt.trim()
          : '(no prompt)';
        const promptShort = promptText.length > 90
          ? `${promptText.slice(0, 87)}…`
          : promptText;
        return `
          <button class="history-card ${run.id === state.currentRunId ? 'active' : ''}" onclick="selectRun('${esc(run.id)}')">
            <div class="history-row">
              <span class="mini-chip">${esc(verdict)}</span>
              <span class="tiny">$${Number(run.totalCostUsd || 0).toFixed(4)}</span>
            </div>
            <div class="history-prompt">${esc(promptShort)}</div>
            <div class="history-row">
              <span class="history-sha">${sha ? `commit ${esc(sha)}` : 'no commit'}</span>
              <span class="tiny">${esc(run.id || '')}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    function renderLoqui() {
      const log = document.getElementById('loqui-log');
      if (!log) return;

      const messages = state.loqui.messages;
      const parts = [];

      if (messages.length === 0 && !state.loqui.thinking) {
        parts.push('<div class="loqui-empty">Ask, plan, or build — Loqui routes it. Try "what files handle auth?", "show me the plan first", or "build a capability registry".</div>');
      } else {
        for (const msg of messages) {
          const isUser = msg.role === 'user';
          const cls = isUser ? 'user' : 'assistant';
          const buildCls = (msg.label === 'Building' || msg.label === 'Resuming') && isUser ? ' build' : '';
          const errCls = msg.error ? ' error' : '';
          const badge = msg.label ? renderIntentBadge(msg.label) : '';
          const titleAttr = msg.reason ? ` title="${esc(msg.reason)}"` : '';
          parts.push(`<div class="loqui-msg ${cls}${buildCls}${errCls}"${titleAttr}>${badge}${esc(msg.text)}</div>`);
        }
      }

      if (state.loqui.thinking) {
        const intent = state.loqui.lastIntent || '';
        const isBuildish = intent === 'Building' || intent === 'Resuming';
        const thinkingClass = isBuildish ? 'loqui-thinking build' : 'loqui-thinking';
        const verb = intent || 'Routing';
        parts.push(
          `<div class="${thinkingClass}">` +
            esc(verb) +
            '<span class="loqui-dots"><span></span><span></span><span></span></span>' +
          '</div>'
        );
      }

      log.innerHTML = parts.join('');
      log.scrollTop = log.scrollHeight;

      const button = document.getElementById('loqui-send');
      if (button) {
        button.disabled = state.loqui.thinking;
        button.textContent = state.loqui.thinking ? 'Wait…' : 'Send';
      }
    }

    /**
     * Render the per-message intent badge. The label values come
     * from core/loqui-router.ts's LoquiIntentLabel type; the class
     * map here mirrors the CSS rules further up so adding a new
     * label only requires touching both sides.
     */
    function renderIntentBadge(label) {
      const cls = String(label)
        .toLowerCase()
        .replace(/\s+/g, '-');
      return `<span class="loqui-intent-badge ${esc(cls)}">${esc(label)}</span>`;
    }

    function renderGraph() {
      const graph = state.active.graph || { nodes: [], edges: [] };
      const svg = document.getElementById('task-graph');
      if (!graph.nodes.length) {
        svg.innerHTML = '<text x="32" y="44" fill="rgba(251,146,60,0.45)" font-family="SFMono-Regular, Consolas, monospace" font-size="14">Waiting for graph</text>';
        return;
      }

      const levels = ['planned', 'ready', 'active', 'completed', 'failed'];
      const grouped = new Map(levels.map((status) => [status, []]));
      for (const node of graph.nodes) {
        const status = grouped.has(node.status) ? node.status : 'planned';
        grouped.get(status).push(node);
      }

      const layout = new Map();
      const columnWidth = 176;
      const rowHeight = 96;
      levels.forEach((status, col) => {
        const nodes = grouped.get(status);
        nodes.forEach((node, row) => {
          layout.set(node.id, { x: 96 + col * columnWidth, y: 78 + row * rowHeight });
        });
      });

      const edgeMarkup = graph.edges.map((edge) => {
        const from = layout.get(edge.from);
        const to = layout.get(edge.to);
        if (!from || !to) return '';
        return `
          <path
            d="M ${from.x + 22} ${from.y} C ${from.x + 68} ${from.y}, ${to.x - 68} ${to.y}, ${to.x - 22} ${to.y}"
            fill="none"
            stroke="rgba(77,245,200,0.36)"
            stroke-width="2.5"
            stroke-linecap="round"
            filter="url(#softGlow)"
          />
        `;
      }).join('');

      const nodeMarkup = graph.nodes.map((node) => {
        const pos = layout.get(node.id) || { x: 100, y: 100 };
        const color = ROLE_COLORS[node.workerType] || '#4df5c8';
        const status = normalizeNodeStatus(node.status);
        const outerOpacity = status === 'completed' ? 0.35 : status === 'failed' ? 0.95 : status === 'active' ? 0.92 : 0.5;
        const coreOpacity = status === 'completed' ? 0.66 : 1;
        const pulseClass = status === 'active' ? 'graph-active' : status === 'failed' ? 'graph-failed' : '';
        const labelColor = status === 'failed' ? '#ff5d6c' : '#fb923c';
        return `
          <g class="${pulseClass}">
            <circle cx="${pos.x}" cy="${pos.y}" r="24" fill="none" stroke="${color}" stroke-width="2" opacity="${outerOpacity}" filter="url(#softGlow)"></circle>
            <circle cx="${pos.x}" cy="${pos.y}" r="12" fill="${status === 'failed' ? '#ff5d6c' : color}" opacity="${coreOpacity}" filter="url(#hardGlow)"></circle>
            <text x="${pos.x}" y="${pos.y + 42}" text-anchor="middle" fill="${labelColor}" font-family="SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.3">${esc(trimLabel(node.label, 16)).toUpperCase()}</text>
          </g>
        `;
      }).join('');

      const headerMarkup = levels.map((status, index) => `
        <text x="${96 + index * columnWidth}" y="28" text-anchor="middle" fill="rgba(251,146,60,0.48)" font-family="SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="2">${status.toUpperCase()}</text>
      `).join('');

      svg.innerHTML = `
        <defs>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="3.5" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <filter id="hardGlow">
            <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <style>
            .graph-active circle:first-child { animation: nodeFlicker 1.35s ease-in-out infinite; }
            .graph-failed circle:first-child, .graph-failed circle:last-of-type { animation: nodeFlicker 0.8s ease-in-out infinite; }
          </style>
        </defs>
        ${headerMarkup}
        ${edgeMarkup}
        ${nodeMarkup}
      `;
    }

    function trimLabel(label, length) {
      const text = String(label || '');
      if (text.length <= length) return text;
      return `${text.slice(0, length - 1)}…`;
    }

    function renderSettings() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = CONFIG_ROLE_ORDER.map((role) => {
        const current = state.modelConfig[role] || DEFAULT_MODEL_CONFIG[role];
        const color = ROLE_COLORS[role] || 'var(--ink)';
        const options = MODEL_OPTIONS[role] || [];
        const fixed = role === 'scout' || role === 'verifier';
        // <option value> is the index into MODEL_OPTIONS[role] so duplicate
        // model names (qwen3.6-plus appears on both modelstudio and portum)
        // are distinguishable. The "selected" check matches BOTH model and
        // provider so the right entry is highlighted on render.
        return `
          <div class="settings-item">
            <div class="role-name" style="color:${color}">${esc(role)}</div>
            ${fixed
              ? `<div class="fixed-model">${esc(current.model)}</div>`
              : `<select id="model-${role}" class="config-select">${options.map((entry, i) => `<option value="${i}" ${entry.model === current.model && entry.provider === current.provider ? 'selected' : ''}>${esc(entry.label)}</option>`).join('')}</select>`}
            <div class="tiny">${esc(current.provider)}</div>
          </div>
        `;
      }).join('');
    }

    function formatDuration(ms) {
      const value = Number(ms || 0);
      if (!value) return '0ms';
      if (value < 1000) return `${Math.round(value)}ms`;
      return `${(value / 1000).toFixed(value >= 10000 ? 0 : 1)}s`;
    }

    function formatInt(value) {
      return Number(value || 0).toLocaleString();
    }

    function selectRun(runId) {
      const run = state.runs.find((entry) => entry.id === runId);
      if (!run) return;
      state.currentRunId = runId;
      state.active = run;
      render();
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    window.selectRun = selectRun;
    document.getElementById('prompt-form').addEventListener('submit', submitPrompt);
    document.getElementById('loqui-form').addEventListener('submit', submitLoqui);
    document.getElementById('config-save').addEventListener('click', saveModelConfig);
    document.getElementById('repo-input').addEventListener('change', persistRepoPath);
    document.getElementById('repo-input').addEventListener('blur', persistRepoPath);

    loadRepoPath();
    restoreRuns();
    renderSettings();
    render();
    connect();
    loadModelConfig();
  </script>
</body>
</html>

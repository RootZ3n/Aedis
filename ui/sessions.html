<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aedis — Sessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --abyss-0:#00030a;--abyss-1:#02061a;--abyss-2:#040d26;--abyss-3:#07173a;
  --abyss-line:rgba(120,210,255,.14);--abyss-edge:rgba(160,220,255,.22);
  --orange:#fb923c;--orange-hot:#ffb366;--orange-dim:rgba(251,146,60,.58);
  --teal:#4df5c8;--teal-hot:#7bffdd;--teal-dim:rgba(77,245,200,.58);
  --cyan:#6fd9ff;--cyan-hot:#a0e9ff;--violet:#b196ff;
  --red:#ff5577;--amber:#ffcf6b;--good:#4df5c8;--gray:rgba(255,255,255,.55);
  --ink:var(--orange);--ink-soft:rgba(251,146,60,.72);
  --body:'Space Grotesk',sans-serif;--mono:'DM Mono',monospace;
  --shadow-panel:0 24px 80px rgba(0,0,0,.72),0 0 0 1px rgba(20,40,80,.6);
}
html,body{
  min-height:100%;
  background:radial-gradient(ellipse 70% 55% at 50% 42%,transparent 24%,rgba(0,0,4,.82) 100%),radial-gradient(circle at 8% 12%,rgba(111,217,255,.16),transparent 34%),radial-gradient(circle at 92% 8%,rgba(77,245,200,.14),transparent 36%),linear-gradient(180deg,#020617 0%,#01030d 46%,#020818 100%);
  color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;
}
a{color:var(--cyan);text-decoration:none}
a:hover{color:var(--teal)}
.nav{background:rgba(4,10,24,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--abyss-line);padding:12px 24px;display:flex;gap:24px;align-items:center;position:sticky;top:0;z-index:100}
.nav a{color:var(--ink-soft);font-size:14px;transition:color 200ms}
.nav a:hover,.nav a.active{color:var(--orange)}
.nav .brand{font-weight:700;font-size:18px;color:var(--orange);margin-right:auto}
.panel{background:rgba(4,10,24,.72);border:1px solid rgba(20,40,80,.6);border-radius:16px;padding:20px 24px;box-shadow:var(--shadow-panel);margin:20px auto;max-width:1100px}
.page-title{font-size:22px;font-weight:700;color:var(--orange);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink-soft);margin-bottom:20px}
.session-card{
  border-radius:14px;
  background:rgba(4,10,24,.6);
  border:1px solid rgba(120,200,255,.08);
  padding:18px 20px;
  margin-bottom:12px;
  transition:border-color 200ms;
}
.session-card:hover{border-color:rgba(120,200,255,.2)}
.session-card.active{border-color:rgba(77,245,200,.28)}
.session-card.done{border-color:rgba(177,150,255,.2)}
.session-card.cancelled,.session-card.failed{border-color:rgba(255,85,119,.2)}
.sc-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.sc-id{font-family:var(--mono);font-size:13px;color:var(--cyan);flex-shrink:0}
.sc-badge{
  font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:999px;
  letter-spacing:.06em;text-transform:uppercase;
}
.sc-badge.active{background:rgba(77,245,200,.14);color:var(--teal);border:1px solid rgba(77,245,200,.38)}
.sc-badge.done{background:rgba(177,150,255,.14);color:var(--violet);border:1px solid rgba(177,150,255,.38)}
.sc-badge.cancelled{background:rgba(255,85,119,.14);color:var(--red);border:1px solid rgba(255,85,119,.38)}
.sc-badge.finished{background:rgba(251,146,60,.14);color:var(--orange);border:1px solid rgba(251,146,60,.38)}
.sc-intent{font-size:14px;color:var(--ink);margin-bottom:8px;line-height:1.4}
.sc-meta{display:flex;gap:20px;flex-wrap:wrap}
.sc-meta span{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.sc-meta span strong{color:var(--ink-soft)}
.sc-terminal{
  margin-top:10px;padding:10px 12px;border-radius:8px;
  border:1px dashed rgba(255,85,119,.28);background:rgba(255,85,119,.05);
  font-size:12px;color:#fca5a5;
}
.cycles{display:flex;gap:3px;margin-top:8px}
.cycle-dot{
  width:10px;height:10px;border-radius:50%;
  border:1px solid rgba(120,200,255,.2);
  background:transparent;
}
.cycle-dot.done{background:var(--teal);border-color:var(--teal);box-shadow:0 0 6px rgba(77,245,200,.5)}
.cycle-dot.current{background:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(255,207,107,.5)}
.empty{text-align:center;padding:40px;color:var(--ink-dim);font-family:var(--mono)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="brand">Aedis</a>
  <a href="/">Loqui</a>
  <a href="/ui/cost.html">Cost</a>
  <a href="/ui/sessions.html" class="active">Sessions</a>
  <a href="/ui/receipt.html">Receipts</a>
  <a href="/ui/cost.html">Cost</a>
  <a href="/ui/trust.html">Trust</a>
</nav>

<main class="panel" style="margin-top:12px">
  <h1 class="page-title">Sessions</h1>
  <p class="page-sub">Autonomous build sessions — cycles, status, and terminal reason.</p>

  <div id="sessions-list">
    <div class="empty">Loading...</div>
  </div>
</main>

<script>
const API = "http://localhost:18796";

function badgeHtml(status) {
  if (status === "active") return '<span class="sc-badge active">Active</span>';
  if (status === "done") return '<span class="sc-badge done">Done</span>';
  if (status === "cancelled") return '<span class="sc-badge cancelled">Cancelled</span>';
  if (status === "finished") return '<span class="sc-badge finished">Finished</span>';
  return `<span class="sc-badge">${status}</span>`;
}

function cycleDots(current, max) {
  return Array.from({length: max}, (_, i) => {
    const cls = i < current ? "done" : i === current ? "current" : "";
    return `<div class="cycle-dot ${cls}" title="cycle ${i+1}"></div>`;
  }).join("");
}

function renderSessions(data) {
  if (!data.sessions?.length) {
    return '<div class="empty">No sessions yet. POST /sessions to start one.</div>';
  }
  return data.sessions.map(s => {
    const statusClass = s.status ?? "unknown";
    const terminal = s.terminalReason
      ? `<div class="sc-terminal">Terminal reason: ${s.terminalReason}</div>` : "";
    return `
      <div class="session-card ${statusClass}">
        <div class="sc-head">
          <span class="sc-id">${s.id}</span>
          ${badgeHtml(s.status)}
        </div>
        <div class="sc-intent">${s.intent?.userRequest ?? "(no request)"}</div>
        <div class="sc-meta">
          <span>project: <strong>${s.intent?.projectRoot ?? "—"}</strong></span>
          <span>cycles: <strong>${s.cycleCount ?? 0}/${s.maxCycles ?? "?"}</strong></span>
          <span>created: <strong>${s.createdAt ? new Date(s.createdAt).toLocaleString() : "—"}</strong></span>
        </div>
        <div class="cycles">${cycleDots(s.cycleCount ?? 0, s.maxCycles ?? 3)}</div>
        ${terminal}
      </div>
    `;
  }).join("");
}

async function load() {
  try {
    const res = await fetch(`${API}/sessions`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const data = await res.json();
    document.getElementById("sessions-list").innerHTML = renderSessions(data);
  } catch(err) {
    document.getElementById("sessions-list").innerHTML = `<div class="empty" style="color:var(--red)">Failed to load: ${err.message}</div>`;
  }
}

load();
</script>
</body>
</html>
